[flake8]
# Turn everything off, and select only what we care about. We can expand selections later.
# NOTE: The one-letter ignores should also list each of their first digits so they don't
#   accidentally ignore a more specific class of errors. (E.g. ignoring "D" might ignore "DOC")
ignore =
    # pyflakes  (built into flake8)
    F4
    F5
    F6
    F7
    F8
    F9
    # mccabe  (built into flake8)
    C901
    # pycodestyle  (built into flake8)
    E1
    E2
    E3
    E4
    E5
    E7
    E9
    W1
    W2
    W3
    W5
    W6
    # pydocstyle  (flake8-docstrings)
    D1
    D2
    D3
    D4
    # flake8-annotations
    # NOTE Ideally we just use `mypy`'s `disallow-untyped-defs`, however there's no easy way to turn
    #   off the checking on test files, so we'll resort to `flake8-annotations` in the meantime
    ANN
    # pydoclint
    DOC

select =
    # Missing docstring in public class
    D101
    # Missing docstring in public method
    D102
    # Missing docstring in public function
    D103
    # Missing docstring in public nested class
    D106
    # Missing docstring in __init__
    D107
    # Missing docstring in inaccessible public class
    D121
    # Missing docstring in private module
    D150
    # Missing docstring in private class
    D151
    # Missing docstring in private method
    D152
    # Missing docstring in private function
    D153
    # Missing docstring in private package
    D154
    # Missing docstring in private nested class
    D156
    # Missing docstring in private __init__
    D157
    # Missing docstring in inaccessible private class
    D171
    # Missing blank line before section ("{name}")
    D411
    # Docstring is empty
    D419
    # Potential formatting errors in docstring.
    DOC001
    # Docstring style mismatch.
    DOC003
    # Docstring contains fewer arguments than in function signature.
    DOC101
    # Docstring contains more arguments than in function signature.
    DOC102
    # Arguments are the same in the docstring and the function signature, but are in a different order.
    DOC104
    # Function/method does not have a return section in docstring.
    DOC201
    # Function/method has a return section in docstring, but there are no return statements or annotations.
    DOC202
    # Missing type annotation for function argument
    ANN001
    # Missing type annotation for `*args`
    ANN002
    # Missing type annotation for `**kwargs`
    ANN003
    # Missing return type annotation for public function
    ANN201
    # Missing return type annotation for protected function
    ANN202
    # Missing return type annotation for secret function
    ANN203
    # Missing return type annotation for staticmethod
    ANN205
    # Missing return type annotation for classmethod
    ANN206

test-ignores =
    D101
    D102
    D103
    D106
    D107
    D121
    D150
    D151
    D152
    D153
    D154
    D155
    D156
    D157
    D171
    D419
    ANN001
    ANN002
    ANN003
    ANN201
    ANN202
    ANN203
    ANN205
    ANN206

per-file-ignores =
    pants-plugins/*:D101,D102,D103,D107,ANN001,ANN201,ANN206

# flake8-annotations
allow-untyped-nested = false
dispatch-decorators=
    # Not technically a dispatch, but oh well
    overrides

# pydocstyle, flake8-docstrings
docstring-convention = all
ignore-decorators = (overrides)|(typing.overload)
ignore-self-only-init = true

# pydoclint
style = google
arg-type-hints-in-docstring = False
check-return-types = False
check-style-mismatch = True