[tool.pylint.MASTER]
init-hook = """
try:
    import gi
    gi.require_version('Gst','1.0')
    from gi.repository import Gst
    Gst.init(None)
except ModuleNotFoundError:
    pass
"""
#load-plugins="pylint_flask_sqlalchemy"
extension-pkg-whitelist="numpy,PyQt5,kenlm"

[tool.pylint.REPORTS]
output-format="parseable"

[tool.pylint.TYPECHECK]
ignored-modules="numpy,matplotlib.cm"
ignored-classes="optparse.Values,thread._local,_thread._local,numpy"
generated-members="torch.*"

[tool.pylint.BASIC]
good-names="i,j,k,ex,Run,_,logger,T"
variable-rgx="(([a-z][a-z0-9_]{0,})|(_[a-z0-9_]*))$"
argument-rgx="(F|([a-z][a-z0-9_]{0,})|(_[a-z0-9_]*))$"
attr-rgx="(([a-z][a-z0-9_]{0,})|(_[a-z0-9_]*))$"
module-rgx="(([a-z_][a-z0-9_]*)|([A-Z][a-zA-Z0-9]+))$"
bad-names="toto,tutu,tata"

[tool.pylint.VARIABLES]
dummy-variables-rgx="(_+[a-zA-Z0-9_]*?$)|dummy"

[tool.pylint.EXCEPTIONS]
overgeneral-exceptions="builtins.Exception"

[tool.pylint.SCORE]
score="n"

[tool.pylint.CLASSES]
valid-classmethod-first-arg="cls"
valid-metaclass-classmethod-first-arg="mcs"

[tool.pylint.'MESSAGES CONTROL']
disable="all"
enable= """
  abstract-method,
  anomalous-backslash-in-string,
  anomalous-unicode-escape-in-string,
  astroid-error,
  attribute-defined-outside-init,
  bad-classmethod-argument,
  bad-except-order,
  bad-exception-context,
  bad-format-character,
  bad-format-string,
  bad-format-string-key,
  bad-mcs-classmethod-argument,
  bad-mcs-method-argument,
  bad-open-mode,
  bad-option-value,
  bad-reversed-sequence,
  bad-staticmethod-argument,
  bad-str-strip-call,
  bad-string-format-type,
  bad-super-call,
  bare-except,
  blacklisted-name,
  broad-except,
  c-extension-no-member,
  cell-var-from-loop,
  chained-comparison,
  class-variable-slots-conflict,
  comparison-with-itself,
  consider-iterating-dictionary,
  consider-merging-isinstance,
  consider-swap-variables,
  consider-using-dict-comprehension,
  consider-using-enumerate,
  consider-using-get,
  consider-using-in,
  consider-using-join,
  consider-using-set-comprehension,
